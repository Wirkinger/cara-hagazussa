<section class="page-section page-section--gallery">

    <h1>Werke</h1>

    <div class="gallery-series">
        <h2 class="gallery-series-title">Ruf der Stille</h2>
        <p class="gallery-series-desc">Kohle auf Papier</p>

        <div class="gallery" data-gallery>
            <button class="gallery-item" type="button" data-index="0">
                <img src="images/rufderstille-1.jpg" alt="Ruf der Stille I" loading="lazy">
                <span class="gallery-caption">I</span>
            </button>
            <button class="gallery-item" type="button" data-index="1">
                <img src="images/rufderstille-2.jpg" alt="Ruf der Stille II" loading="lazy">
                <span class="gallery-caption">II</span>
            </button>
            <button class="gallery-item" type="button" data-index="2">
                <img src="images/rufderstille-3.jpg" alt="Ruf der Stille III" loading="lazy">
                <span class="gallery-caption">III</span>
            </button>
            <button class="gallery-item" type="button" data-index="3">
                <img src="images/rufderstille-4.jpg" alt="Ruf der Stille IV" loading="lazy">
                <span class="gallery-caption">IV</span>
            </button>
            <button class="gallery-item" type="button" data-index="4">
                <img src="images/rufderstille-5.jpg" alt="Ruf der Stille V" loading="lazy">
                <span class="gallery-caption">V</span>
            </button>
            <button class="gallery-item" type="button" data-index="5">
                <img src="images/rufderstille-6.jpg" alt="Ruf der Stille VI" loading="lazy">
                <span class="gallery-caption">VI</span>
            </button>
            <button class="gallery-item gallery-item--wide" type="button" data-index="6">
                <img src="images/rufderstille-7.jpg" alt="Ruf der Stille VII" loading="lazy">
                <span class="gallery-caption">VII</span>
            </button>
        </div>
    </div>

    <div class="gallery-series">
        <h2 class="gallery-series-title">Philosophers</h2>
        <p class="gallery-series-desc">Gesso auf Leinwand</p>

        <div class="gallery gallery--featured" data-gallery>
            <button class="gallery-item gallery-item--featured" type="button" data-index="7">
                <img src="images/philosophers.jpg" alt="Philosophers" loading="lazy">
                <span class="gallery-caption">Philosophers</span>
            </button>
        </div>
    </div>

</section>
